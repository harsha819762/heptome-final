query ListServiceCategories @auth(level: PUBLIC, insecureReason: "Anyone can browse categories") {
  serviceCategories {
    id
    name
    basePrice
    iconUrl
    description
  }
}

query GetUserProfile($id: UUID!) @auth(level: PUBLIC, insecureReason: "For profiling purposes") {
  user(id: $id) {
    id
    name
    email
    role
    phoneNumber
    avatarUrl
    address
    rating
  }
}

query ListCustomerBookings($customerId: UUID!) @auth(level: PUBLIC, insecureReason: "Show customer bookings") {
  bookings(where: { customerId: { eq: $customerId } }) {
    id
    status
    bookingDate
    totalAmount
    partnerNotes
    serviceCategory {
      name
    }
    partner {
      name
      phoneNumber
    }
  }
}

query ListPartnerAvailability($partnerId: UUID!) @auth(level: PUBLIC, insecureReason: "Check schedule") {
  partnerAvailabilities(where: { partnerId: { eq: $partnerId } }) {
    id
    startTime
    endTime
    isBooked
  }
}

query ListPartnerReviews($partnerId: UUID!) @auth(level: PUBLIC, insecureReason: "Check partner ratings") {
  reviews(where: { partnerId: { eq: $partnerId } }) {
    id
    rating
    comment
    createdAt
    customer {
      name
      avatarUrl
    }
  }
}

query ListAllUsers($role: String) @auth(level: PUBLIC, insecureReason: "Admin listing") {
  users(where: { role: { eq: $role } }) {
    id
    name
    email
    role
    phoneNumber
    avatarUrl
    address
    rating
  }
}

query ListAllBookings @auth(level: PUBLIC, insecureReason: "Admin listing") {
  bookings(orderBy: { bookingDate: DESC }) {
    id
    status
    bookingDate
    totalAmount
    partnerNotes
    customer {
      id
      name
      email
    }
    partner {
      id
      name
    }
    serviceCategory {
      id
      name
    }
  }
}

query GetBookingById($id: UUID!) @auth(level: PUBLIC, insecureReason: "Detailed view") {
  booking(id: $id) {
    id
    status
    bookingDate
    totalAmount
    partnerNotes
    customerReview
    customer {
      id
      name
      email
      phoneNumber
      address
    }
    partner {
      id
      name
      email
      phoneNumber
    }
    serviceCategory {
      id
      name
      basePrice
    }
  }
}

query ListProviderBookings($partnerId: UUID!) @auth(level: PUBLIC, insecureReason: "Provider dashboard") {
  bookings(where: { partnerId: { eq: $partnerId } }, orderBy: { bookingDate: DESC }) {
    id
    status
    bookingDate
    totalAmount
    partnerNotes
    customer {
      id
      name
      email
      phoneNumber
      address
    }
    serviceCategory {
      id
      name
    }
  }
}

query ListPendingBookings($serviceCategoryIds: [UUID!]) @auth(level: PUBLIC, insecureReason: "Provider lead board") {
  bookings(where: { status: { eq: "PENDING" } }, orderBy: { bookingDate: DESC }) {
    id
    status
    bookingDate
    totalAmount
    partnerNotes
    customer {
      id
      name
      address
    }
    serviceCategory {
      id
      name
    }
  }
}
