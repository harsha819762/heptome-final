# List all service categories
query ListServiceCategories @auth(level: PUBLIC, insecureReason: "Anyone can browse categories") {
  serviceCategories {
    id
    name
    basePrice
    iconUrl
    description
  }
}

# Get user profile details
query GetUserProfile($id: UUID!) @auth(level: PUBLIC, insecureReason: "For profiling purposes") {
  user(id: $id) {
    id
    name
    email
    role
    phoneNumber
    avatarUrl
    address
    rating
  }
}

# List bookings for a customer
query ListCustomerBookings($customerId: UUID!) @auth(level: PUBLIC, insecureReason: "Show customer bookings") {
  bookings(where: { customerId: { eq: $customerId } }) {
    id
    status
    bookingDate
    totalAmount
    partnerNotes
    serviceCategory {
      name
    }
    partner {
      name
      phoneNumber
    }
  }
}

# List availability for a partner
query ListPartnerAvailability($partnerId: UUID!) @auth(level: PUBLIC, insecureReason: "Check schedule") {
  partnerAvailabilities(where: { partnerId: { eq: $partnerId } }) {
    id
    startTime
    endTime
    isBooked
  }
}

# List reviews for a partner
query ListPartnerReviews($partnerId: UUID!) @auth(level: PUBLIC, insecureReason: "Check partner ratings") {
  reviews(where: { partnerId: { eq: $partnerId } }) {
    id
    rating
    comment
    createdAt
    customer {
      name
      avatarUrl
    }
  }
}
